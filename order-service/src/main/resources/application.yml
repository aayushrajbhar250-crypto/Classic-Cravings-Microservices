spring:
  application:
    name: "order-service"
  cloud:
    function:
      web:
        path: "/api"
    stream:
      bindings:
        orderCreated-out-0:
          destination: order.event
          content-type: application/json
          group: ${spring.application.name}
  RabbitMQ:
    host: localhost
    port: 5672
    username: guest
    password: guest
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
server:
  port: 9097