spring:
  application:
    name: "order-service"
  cloud:
    function:
      web:
        path: "/api"
    stream:
      bindings:
        orderCreated-out-0:
          destination: order.event
          content-type: application/json
          group: ${spring.application.name}
      Kafka:
        binder:
          brokers:
            - localhost:9000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
server:
  port: 9097